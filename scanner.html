<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner - NeoBank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .scanner-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: calc(100vh - 150px);
        }
        .scanner-frame {
            width: 300px; height: 300px; border: 4px solid var(--primary-color);
            border-radius: 20px; position: relative; margin-bottom: 2rem;
            display: flex; align-items: center; justify-content: center;
            background: rgba(99, 102, 241, 0.05); overflow: hidden;
        }
        .scanner-line {
            width: 100%; height: 4px; background: var(--primary-color);
            position: absolute; top: 0; left: 0;
            box-shadow: 0 0 10px var(--primary-color);
            animation: scan 2s infinite linear;
        }
        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }
        .upload-area {
            text-align: center; margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i data-lucide="zap"></i> NeoBank
            </div>
            <ul class="nav-links">
                <li><a href="dashboard.html"><i data-lucide="layout-dashboard"></i> Dashboard</a></li>
                <li><a href="accounts.html"><i data-lucide="wallet"></i> Accounts</a></li>
                <li><a href="cards.html"><i data-lucide="credit-card"></i> Cards</a></li>
                <li><a href="payments.html"><i data-lucide="send"></i> Payments</a></li>
                <li><a href="profile.html"><i data-lucide="user"></i> Profile</a></li>
                <li><a href="rewards.html"><i data-lucide="gift"></i> Rewards</a></li>
                <li style="margin-top: 2rem;"><a href="#" onclick="logout()"><i data-lucide="log-out"></i> Logout</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <button class="menu-toggle" id="menu-toggle"><i data-lucide="menu"></i></button>
                <h1 class="page-title fade-in">Scan QR Code</h1>
            </header>

            <div class="fade-in scanner-container">
                <div class="scanner-frame">
                    <div class="scanner-line"></div>
                    <i data-lucide="qr-code" style="width: 150px; height: 150px; color: var(--text-muted); opacity: 0.3;"></i>
                </div>
                
                <h2>Scan or Upload QR</h2>
                <p class="text-muted" style="margin-top: 0.5rem; text-align: center; max-width: 400px; line-height: 1.5;">
                    Position the QR code within the frame to scan, or upload an image from your gallery to make a quick payment.
                </p>

                <div class="upload-area">
                    <input type="file" id="qr-upload" accept="image/*" style="display: none;">
                    <button class="btn btn-primary" onclick="document.getElementById('qr-upload').click()" style="display: flex; align-items: center; gap: 0.5rem;">
                        <i data-lucide="upload"></i> Upload from Gallery
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if(window.lucide) window.lucide.createIcons();
            
            const fileInput = document.getElementById('qr-upload');
            if(fileInput) {
                fileInput.addEventListener('change', (e) => {
                    if(e.target.files && e.target.files.length > 0) {
                        window.showToast("QR Code recognized!", "success");
                        setTimeout(() => {
                            window.location.href = 'payments.html?tab=upi';
                        }, 1000);
                    }
                });
            }
        });

        function logout() { window.location.href = 'index.html'; }
    </script>
</body>
</html>
